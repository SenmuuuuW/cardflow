services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cardflow
      POSTGRES_DB: cardflow_development
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - cardflow-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-database.sql:/docker-entrypoint-initdb.d/01-create-test-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardflow -d cardflow_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cardflow-postgres-data:
